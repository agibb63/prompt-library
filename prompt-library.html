<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #e8c547;
    --accent-dim: rgba(232,197,71,0.12);
    --text: #e8e8e8;
    --text-dim: #888;
    --text-muted: #555;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 500;
    color: var(--accent); letter-spacing: 0.06em; white-space: nowrap;
  }

  #search {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; padding: 8px 12px; outline: none;
    transition: border-color 0.15s;
  }
  #search::placeholder { color: var(--text-muted); }
  #search:focus { border-color: var(--accent); }

  #add-btn {
    background: var(--accent); border: none;
    border-radius: var(--radius);
    color: #0f0f0f; cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 8px 14px; white-space: nowrap;
    transition: opacity 0.15s;
  }
  #add-btn:hover { opacity: 0.85; }

  .container { display: flex; height: calc(100vh - 57px); }

  .sidebar {
    width: 280px; min-width: 200px;
    border-right: 1px solid var(--border);
    overflow-y: auto; flex-shrink: 0;
  }

  @media (max-width: 640px) {
    .container { flex-direction: column; height: auto; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
    .detail { min-height: 60vh; }
  }

  .category-group { border-bottom: 1px solid var(--border); }

  .category-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-muted); padding: 12px 14px 6px;
  }

  .prompt-item {
    cursor: pointer; padding: 10px 14px;
    border-left: 3px solid transparent;
    transition: background 0.1s, border-color 0.1s;
    display: flex; flex-direction: column; gap: 3px;
  }
  .prompt-item:hover { background: var(--surface); }
  .prompt-item.active { background: var(--accent-dim); border-left-color: var(--accent); }

  .item-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }

  .detail {
    flex: 1; overflow-y: auto; padding: 28px 32px;
    display: flex; flex-direction: column; gap: 20px;
  }

  @media (max-width: 640px) { .detail { padding: 20px 16px; } }

  .detail-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 13px; gap: 8px; text-align: center;
  }
  .detail-empty .icon { font-size: 32px; opacity: 0.4; }

  .detail-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; gap: 16px; flex-wrap: wrap;
  }

  .detail-title { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.25; flex: 1; }

  .detail-category {
    font-size: 11px; font-family: 'IBM Plex Mono', monospace;
    color: var(--accent); background: var(--accent-dim);
    border: 1px solid rgba(232,197,71,0.25);
    border-radius: 4px; padding: 3px 8px; white-space: nowrap; margin-top: 3px;
  }

  .detail-notes { font-size: 13px; color: var(--text-dim); line-height: 1.6; font-style: italic; }

  .prompt-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }

  .prompt-box-header {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }

  .prompt-box-label {
    font-size: 11px; font-family: 'IBM Plex Mono', monospace;
    color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase;
  }

  .copy-btn {
    background: transparent; border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-dim); cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 500;
    padding: 5px 12px; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: #4caf78; color: #4caf78; }

  .prompt-text {
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.7;
    color: var(--text); padding: 16px; white-space: pre-wrap; word-break: break-word;
  }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 11px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-dim); padding: 3px 8px; font-family: 'IBM Plex Mono', monospace;
  }

  .action-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .edit-btn, .delete-btn {
    font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 500;
    padding: 7px 14px; border-radius: var(--radius); cursor: pointer;
    border: 1px solid var(--border); transition: all 0.15s;
  }
  .edit-btn { background: var(--surface); color: var(--text-dim); }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .delete-btn { background: transparent; color: var(--text-muted); }
  .delete-btn:hover { border-color: #e05454; color: #e05454; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .modal h2 { font-size: 16px; font-weight: 600; color: var(--text); }

  .form-row { display: flex; flex-direction: column; gap: 6px; }
  .form-row label { font-size: 12px; color: var(--text-dim); font-weight: 500; }

  .form-row input, .form-row select, .form-row textarea {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif; font-size: 14px;
    padding: 9px 12px; outline: none; transition: border-color 0.15s; width: 100%;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
  .form-row textarea {
    font-family: 'IBM Plex Mono', monospace; font-size: 13px;
    min-height: 160px; resize: vertical; line-height: 1.6;
  }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }

  .btn-save {
    background: var(--accent); border: none; border-radius: var(--radius);
    color: #0f0f0f; cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 9px 20px;
  }
  .btn-save:hover { opacity: 0.85; }

  .btn-cancel {
    background: transparent; border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text-dim); cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; padding: 9px 16px;
  }
  .btn-cancel:hover { border-color: var(--text-dim); }

  .count-label {
    font-size: 11px; color: var(--text-muted); padding: 8px 14px 4px;
    font-family: 'IBM Plex Mono', monospace;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ PROMPTS</div>
  <input id="search" type="search" placeholder="Search prompts…" autocomplete="off">
  <button id="add-btn" onclick="openModal()">+ New</button>
</header>

<div class="container">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="detail" id="detail">
    <div class="detail-empty">
      <div class="icon">📋</div>
      <div>Select a prompt to view it</div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalIfOutside(event)">
  <div class="modal">
    <h2 id="modal-title">New Prompt</h2>
    <div class="form-row">
      <label>Title *</label>
      <input id="f-title" type="text" placeholder="Short descriptive name">
    </div>
    <div class="form-row">
      <label>Category</label>
      <input id="f-category" type="text" placeholder="e.g. Writing, Research, Code…" list="cat-list">
      <datalist id="cat-list"></datalist>
    </div>
    <div class="form-row">
      <label>Prompt *</label>
      <textarea id="f-prompt" placeholder="Paste your full prompt here…"></textarea>
    </div>
    <div class="form-row">
      <label>Notes (optional)</label>
      <input id="f-notes" type="text" placeholder="When to use this, model tips, etc.">
    </div>
    <div class="form-row">
      <label>Tags (comma-separated)</label>
      <input id="f-tags" type="text" placeholder="e.g. rewrite, tone, summarize">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="savePrompt()">Save Prompt</button>
    </div>
  </div>
</div>

<script>
const SEED_PROMPTS = [
  {
    id: "seed-1",
    title: "Rewrite for Clarity",
    category: "Writing",
    prompt: `Rewrite the following text to improve clarity and conciseness. Eliminate redundancy, fix passive voice where it weakens the sentence, and ensure each sentence carries its own weight. Preserve the original meaning exactly — do not add new information or change the tone.\n\nText to rewrite:\n[PASTE TEXT HERE]`,
    notes: "Good for editing draft emails or reports.",
    tags: ["rewrite","editing","clarity"],
    created: Date.now()
  },
  {
    id: "seed-2",
    title: "Summarize Long Document",
    category: "Research",
    prompt: `Summarize the following document. Structure your summary as:\n1. One-sentence purpose/thesis\n2. Key findings or arguments (bullet list, max 6 items)\n3. Notable caveats or limitations\n4. Bottom line — what action or conclusion does this document support?\n\nDocument:\n[PASTE DOCUMENT HERE]`,
    notes: "Works well for research papers, reports, articles.",
    tags: ["summarize","research","document"],
    created: Date.now()
  },
  {
    id: "seed-3",
    title: "Explain It to a Smart Generalist",
    category: "Research",
    prompt: `Explain [TOPIC] to me. Assume I'm intelligent and comfortable with complexity, but have no prior knowledge of this specific subject. Use analogies to related concepts where helpful. Avoid over-simplifying but also avoid assuming domain vocabulary without defining it first. Length: 3–5 paragraphs.`,
    notes: "Good for quickly understanding a new domain.",
    tags: ["explainer","learning"],
    created: Date.now()
  },
  {
    id: "seed-4",
    title: "Pro/Con Decision Matrix",
    category: "Planning",
    prompt: `I need to decide between the following options: [LIST OPTIONS]\n\nContext: [BRIEF SITUATION DESCRIPTION]\nMy priorities are: [LIST 3–5 PRIORITIES]\n\nBuild a structured pro/con analysis for each option. Then give a direct recommendation with your reasoning. Don't hedge — pick the best option given my stated priorities.`,
    notes: "Forces a concrete recommendation rather than wishy-washy analysis.",
    tags: ["decision","analysis","planning"],
    created: Date.now()
  },
  {
    id: "seed-5",
    title: "Code Review",
    category: "Code",
    prompt: `Review the following code. Focus on:\n- Bugs or logical errors\n- Security vulnerabilities\n- Performance issues\n- Readability and maintainability\n- Anything that violates best practices for this language/framework\n\nFor each issue, state: (1) what it is, (2) why it matters, (3) how to fix it. If the code is clean, say so plainly.\n\nLanguage/Framework: [SPECIFY]\nCode:\n\`\`\`\n[PASTE CODE]\n\`\`\``,
    notes: "Adjust the focus list to match your review goals.",
    tags: ["code","review","debugging"],
    created: Date.now()
  }
];

const STORE_KEY = "prompt_library_v1";

function loadPrompts() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  const data = { prompts: SEED_PROMPTS };
  saveData(data);
  return data;
}

function saveData(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

let DATA = loadPrompts();
let activeId = null;
let editingId = null;

function getFilteredPrompts() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  if (!q) return DATA.prompts;
  return DATA.prompts.filter(p =>
    p.title.toLowerCase().includes(q) ||
    (p.category || "").toLowerCase().includes(q) ||
    p.prompt.toLowerCase().includes(q) ||
    (p.tags || []).some(t => t.toLowerCase().includes(q))
  );
}

function renderSidebar() {
  const filtered = getFilteredPrompts();
  const sidebar = document.getElementById("sidebar");
  if (!filtered.length) {
    sidebar.innerHTML = `<div class="count-label">No results</div>`;
    return;
  }
  const groups = {};
  filtered.forEach(p => {
    const cat = p.category || "Uncategorized";
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(p);
  });
  let html = `<div class="count-label">${filtered.length} prompt${filtered.length !== 1 ? "s" : ""}</div>`;
  Object.keys(groups).sort().forEach(cat => {
    html += `<div class="category-group"><div class="category-label">${escHtml(cat)}</div>`;
    groups[cat].forEach(p => {
      const active = p.id === activeId ? " active" : "";
      html += `<div class="prompt-item${active}" onclick="selectPrompt('${p.id}')"><div class="item-title">${escHtml(p.title)}</div></div>`;
    });
    html += `</div>`;
  });
  sidebar.innerHTML = html;
}

function renderDetail(id) {
  const p = DATA.prompts.find(x => x.id === id);
  const detail = document.getElementById("detail");
  if (!p) {
    detail.innerHTML = `<div class="detail-empty"><div class="icon">📋</div><div>Select a prompt to view it</div></div>`;
    return;
  }
  detail.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${escHtml(p.title)}</div>
      ${p.category ? `<div class="detail-category">${escHtml(p.category)}</div>` : ""}
    </div>
    ${p.notes ? `<div class="detail-notes">${escHtml(p.notes)}</div>` : ""}
    <div class="prompt-box">
      <div class="prompt-box-header">
        <span class="prompt-box-label">Prompt</span>
        <button class="copy-btn" id="copy-btn" onclick="copyPrompt('${id}')">
          <span id="copy-icon">⎘</span> <span id="copy-label">Copy</span>
        </button>
      </div>
      <div class="prompt-text">${escHtml(p.prompt)}</div>
    </div>
    ${p.tags && p.tags.length ? `<div class="tags">${p.tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join("")}</div>` : ""}
    <div class="action-row">
      <button class="edit-btn" onclick="openModal('${id}')">✎ Edit</button>
      <button class="delete-btn" onclick="deletePrompt('${id}')">✕ Delete</button>
    </div>
  `;
}

function selectPrompt(id) {
  activeId = id;
  renderSidebar();
  renderDetail(id);
  if (window.innerWidth <= 640) {
    document.getElementById("detail").scrollIntoView({ behavior: "smooth" });
  }
}

function copyPrompt(id) {
  const p = DATA.prompts.find(x => x.id === id);
  if (!p) return;
  const btn = document.getElementById("copy-btn");
  const label = document.getElementById("copy-label");
  const icon = document.getElementById("copy-icon");
  function onSuccess() {
    btn.classList.add("copied");
    icon.textContent = "✓";
    label.textContent = "Copied!";
    setTimeout(() => { btn.classList.remove("copied"); icon.textContent = "⎘"; label.textContent = "Copy"; }, 2000);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(p.prompt).then(onSuccess).catch(() => execCopy(p.prompt, onSuccess));
  } else {
    execCopy(p.prompt, onSuccess);
  }
}

function execCopy(text, cb) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
  document.body.appendChild(ta);
  ta.select();
  ta.setSelectionRange(0, 99999);
  try { document.execCommand("copy"); cb(); } catch(e) { alert("Copy failed — select text manually."); }
  document.body.removeChild(ta);
}

function openModal(id) {
  editingId = id || null;
  document.getElementById("modal-title").textContent = id ? "Edit Prompt" : "New Prompt";
  if (id) {
    const p = DATA.prompts.find(x => x.id === id);
    document.getElementById("f-title").value = p.title;
    document.getElementById("f-category").value = p.category || "";
    document.getElementById("f-prompt").value = p.prompt;
    document.getElementById("f-notes").value = p.notes || "";
    document.getElementById("f-tags").value = (p.tags || []).join(", ");
  } else {
    ["f-title","f-category","f-prompt","f-notes","f-tags"].forEach(id => document.getElementById(id).value = "");
  }
  const cats = [...new Set(DATA.prompts.map(p => p.category).filter(Boolean))].sort();
  document.getElementById("cat-list").innerHTML = cats.map(c => `<option value="${escHtml(c)}">`).join("");
  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(() => document.getElementById("f-title").focus(), 50);
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  editingId = null;
}

function closeModalIfOutside(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
}

function savePrompt() {
  const title = document.getElementById("f-title").value.trim();
  const prompt = document.getElementById("f-prompt").value.trim();
  if (!title || !prompt) { alert("Title and Prompt are required."); return; }
  const tags = document.getElementById("f-tags").value.split(",").map(t => t.trim()).filter(Boolean);
  if (editingId) {
    const idx = DATA.prompts.findIndex(p => p.id === editingId);
    DATA.prompts[idx] = { ...DATA.prompts[idx], title, category: document.getElementById("f-category").value.trim(), prompt, notes: document.getElementById("f-notes").value.trim(), tags, updated: Date.now() };
    activeId = editingId;
  } else {
    const np = { id: "p-" + Date.now(), title, category: document.getElementById("f-category").value.trim(), prompt, notes: document.getElementById("f-notes").value.trim(), tags, created: Date.now() };
    DATA.prompts.unshift(np);
    activeId = np.id;
  }
  saveData(DATA);
  closeModal();
  renderSidebar();
  renderDetail(activeId);
}

function deletePrompt(id) {
  const p = DATA.prompts.find(x => x.id === id);
  if (!p || !confirm(`Delete "${p.title}"? This cannot be undone.`)) return;
  DATA.prompts = DATA.prompts.filter(x => x.id !== id);
  saveData(DATA);
  activeId = null;
  renderSidebar();
  renderDetail(null);
}

function escHtml(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

document.getElementById("search").addEventListener("input", renderSidebar);

document.addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); document.getElementById("search").focus(); }
  if (e.key === "Escape") closeModal();
});

renderSidebar();
</script>
</body>
</html>
